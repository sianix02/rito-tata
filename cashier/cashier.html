<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RITO&TATA — Cashier Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Sidebar backdrop overlay (mobile) — OUTSIDE app-wrapper, same as admin -->
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="app-wrapper">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">🛒</div>
      <div class="brand-text">
        <div class="brand-name">RITO&amp;TATA<br>Grocery Store</div>
        <div class="brand-tag">Cashier Portal</div>
      </div>
      <!-- Mobile close button inside sidebar-brand, same as admin -->
      <button class="sidebar-close" onclick="closeSidebar()" aria-label="Close menu">✕</button>
    </div>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">C</div>
      <div>
        <div class="user-name" id="user-name">Cashier</div>
        <div class="user-role">💼 Cashier</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Overview</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard');closeSidebar()"><span class="nav-icon">🏠</span> Dashboard</div>

      <div class="nav-label">Store</div>
      <div class="nav-item" data-page="products" onclick="navigate('products');closeSidebar()"><span class="nav-icon">🏷️</span> View Products</div>

      <div class="nav-label">Transactions</div>
      <div class="nav-item" data-page="transaction" onclick="navigate('transaction');closeSidebar()"><span class="nav-icon">🛒</span> New Transaction</div>
      <div class="nav-item" data-page="sales" onclick="navigate('sales');closeSidebar()"><span class="nav-icon">📋</span> My Sales</div>

      <div class="nav-label">Account</div>
      <div class="nav-item" data-page="settings" onclick="navigate('settings');closeSidebar()"><span class="nav-icon">🔒</span> Change Password</div>
    </nav>

    <div class="sidebar-footer">
      <div class="nav-item" onclick="doLogout()"><span class="nav-icon">🚪</span> Log Out</div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <!-- Hamburger — visible on mobile/tablet, same as admin -->
        <button class="hamburger" id="hamburger-btn" onclick="openSidebar()" aria-label="Open menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div>
          <div class="page-title" id="page-title">Dashboard</div>
          <div class="page-date" id="page-date"></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="live-time" id="live-time"></div>
      </div>
    </header>
    <main class="page-content" id="page-content"></main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../shared-store.js"></script>
<script src="script/main.js"></script>

<script>
  /* Sidebar toggle helpers — identical pattern to admin */
  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('open');
    document.getElementById('hamburger-btn').setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
    document.getElementById('hamburger-btn').setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeSidebar();
  });
  window.addEventListener('resize', function() {
    if (window.innerWidth > 900) closeSidebar();
  });
</script>

</body>
</html>
