<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RITO&TATA — Cashier Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-wrapper">

  <!-- ══ SIDEBAR OVERLAY (mobile) ══ -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <!-- Mobile close button -->
    <button class="sidebar-close-btn" id="sidebar-close-btn" onclick="closeSidebar()" aria-label="Close menu">✕</button>

    <div class="sidebar-brand">
      <div class="brand-logo">🛒</div>
      <div class="brand-name">RITO&TATA<br>Grocery Store</div>
      <div class="brand-tag">Cashier Portal</div>
    </div>
    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">C</div>
      <div>
        <div class="user-name" id="user-name">Cashier</div>
        <div class="user-role">💼 Cashier</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Overview</div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard');closeSidebar()"><span class="nav-icon">🏠</span> Dashboard</div>

      <div class="nav-label">Store</div>
      <div class="nav-item" data-page="products" onclick="navigate('products');closeSidebar()"><span class="nav-icon">🏷️</span> View Products</div>

      <div class="nav-label">Transactions</div>
      <div class="nav-item" data-page="transaction" onclick="navigate('transaction');closeSidebar()"><span class="nav-icon">🛒</span> New Transaction</div>
      <div class="nav-item" data-page="sales" onclick="navigate('sales');closeSidebar()"><span class="nav-icon">📋</span> My Sales</div>

      <div class="nav-label">Account</div>
      <div class="nav-item" data-page="settings" onclick="navigate('settings');closeSidebar()"><span class="nav-icon">🔒</span> Change Password</div>
    </nav>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="doLogout()"><span class="nav-icon">🚪</span> Log Out</div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <!-- Hamburger — visible only on mobile -->
        <button class="hamburger-btn" id="hamburger-btn" onclick="openSidebar()" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
        <div>
          <div class="page-title" id="page-title">Dashboard</div>
          <div class="page-date" id="page-date"></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="live-time" id="live-time"></div>
      </div>
    </header>
    <main class="page-content" id="page-content"></main>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../shared-store.js"></script>
<script src="script/main.js"></script>
</body>
</html>
